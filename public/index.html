<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
:root{--navy:#233b57;--brand:#F79A2B;--brandD:#e07f10;--brandSoft:#FDF1E1;--bg:#F8FAFC;--card:#fff;--ink:#3A4756;--muted:#8592A0;--line:#EBEFF4;--line2:#F1F4F8;
--green:#1E9E73;--greenS:#E9F7F1;--red:#E0574B;--redS:#FCEEEC;--amber:#E0972A;--amberS:#FBF2E1;--blue:#4A82E0;--blueS:#EBF2FD;--slate:#8592A0;--slateS:#F0F3F7;
--sh-sm:0 1px 2px rgba(16,24,40,.04);--sh:0 2px 10px rgba(16,24,40,.05);--sh-lg:0 12px 34px rgba(16,24,40,.14)}
*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',-apple-system,'Segoe UI',Roboto,Arial,sans-serif;font-size:13.5px;line-height:1.55;-webkit-font-smoothing:antialiased}
a{color:var(--brandD);text-decoration:none}
/* ---- Login ---- */
.login{min-height:100vh;display:grid;place-items:center;background:radial-gradient(1200px 500px at 50% -10%,#fff,transparent),var(--bg)}
.loginbox{width:380px;max-width:92vw;background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--sh-lg);padding:34px 32px}
.loginbox .lg{display:flex;flex-direction:column;align-items:center;margin-bottom:22px}
.loginbox img{width:56px;height:56px;border-radius:14px;box-shadow:0 2px 8px rgba(16,24,40,.14);margin-bottom:12px}
.loginbox h1{font-size:21px;margin:0;color:var(--navy);font-weight:600}.loginbox .sub{font-size:12.5px;color:var(--muted);margin-top:3px}
.fld{margin-bottom:14px}.fld label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px}
.fld input,.fld select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:13.5px;font-family:inherit;color:var(--ink);outline:none}
.fld input:focus,.fld select:focus{border-color:var(--brand)}
.lerr{color:var(--red);font-size:12.5px;margin:2px 0 12px;min-height:16px}
.hidden{display:none!important}
/* ---- App shell ---- */
.app{display:grid;grid-template-columns:238px 1fr;min-height:100vh}
.side{background:#fff;border-right:1px solid var(--line);position:sticky;top:0;height:100vh;overflow:auto}
.brand{display:flex;align-items:center;gap:11px;padding:20px 20px 16px}
.brand img{width:38px;height:38px;border-radius:11px;background:#fff;padding:3px;box-shadow:0 1px 4px rgba(16,24,40,.12)}
.brand .bn{font-size:19px;font-weight:600;color:var(--navy)}.brand .bs{font-size:10.5px;color:var(--muted)}
.nav{padding:8px 12px}.navlbl{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:#A6B1BE;margin:16px 20px 8px;font-weight:600}
.navi{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:9px;cursor:pointer;color:#5E6B7A;font-weight:500;font-size:13.5px;margin:2px 0;position:relative}
.navi:hover{background:#F5F7FA;color:var(--navy)}.navi svg{width:18px;height:18px;stroke:#9BA6B3;flex:none}
.navi.on{background:var(--brandSoft);color:var(--brandD);font-weight:600}.navi.on::before{content:"";position:absolute;left:-12px;top:9px;bottom:9px;width:3px;border-radius:0 3px 3px 0;background:var(--brand)}
.navi.on svg{stroke:var(--brand)}.navi .bdg{margin-left:auto;background:#EEF1F5;color:#7C8A98;border-radius:20px;padding:1px 9px;font-size:11px;font-weight:600}.navi.on .bdg{background:var(--brand);color:#fff}
.main{min-height:100vh}
.top{display:flex;align-items:center;gap:14px;padding:13px 26px;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:8}
.top h1{font-size:18px;margin:0;font-weight:600;color:var(--navy)}.top .crumb{font-size:12px;color:var(--muted)}.spacer{flex:1}
.umenu{display:flex;align-items:center;gap:9px;padding:4px 6px 4px 11px;border:1px solid var(--line);border-radius:22px;background:#fff}
.umenu .av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#F7A948,#e88f1f);color:#fff;display:grid;place-items:center;font-weight:600;font-size:12px}
.umenu .nm{font-size:12.5px;font-weight:600;color:var(--navy);line-height:1.1}.umenu .rl{font-size:11px;color:var(--muted);text-transform:capitalize}
.wrap{padding:22px 26px 46px}
.grid{display:grid;gap:16px}.kpis{grid-template-columns:repeat(auto-fit,minmax(186px,1fr))}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:17px 19px;box-shadow:var(--sh-sm)}
.chd{display:flex;align-items:center;gap:10px;margin:0 0 14px}.chd h2{font-size:14.5px;margin:0;font-weight:600;color:var(--navy)}.chd .leg{margin-left:auto;font-size:12px;color:var(--muted)}
.kpi .khead{display:flex;justify-content:space-between}.kpi .kic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center}.kpi .kic svg{width:19px;height:19px}
.kpi .v{font-size:27px;font-weight:600;color:var(--navy);margin-top:14px;letter-spacing:-.5px}.kpi .l{font-size:12.5px;color:var(--muted);margin-top:6px}
.row2{display:grid;grid-template-columns:1.5fr 1fr;gap:16px}@media(max-width:940px){.row2{grid-template-columns:1fr}}
.tablecard{padding:0;overflow:hidden}.tablecard .chd{padding:17px 19px 2px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;color:var(--muted);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;padding:11px 16px;background:#FBFCFE;border-bottom:1px solid var(--line)}
tbody td{padding:11px 16px;border-bottom:1px solid var(--line2)}tbody tr:last-child td{border-bottom:none}tbody tr:hover td{background:#FBFCFE}
.clickrow{cursor:pointer}.tt{font-weight:600;color:var(--navy)}.mono{font-family:Consolas,monospace;font-size:11.5px;color:var(--muted)}
.pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600}.pill .pd{width:6px;height:6px;border-radius:50%;background:currentColor}
.p-critical{background:var(--redS);color:var(--red)}.p-high{background:var(--amberS);color:#a05a00}.p-medium{background:#FDF6E7;color:#9a7a15}.p-low{background:var(--greenS);color:var(--green)}.p-info{background:var(--slateS);color:var(--slate)}
.p-open{background:var(--redS);color:var(--red)}.p-inprogress{background:var(--amberS);color:#a05a00}.p-closed{background:var(--greenS);color:var(--green)}
.p-completed{background:var(--greenS);color:var(--green)}.p-running{background:var(--blueS);color:var(--blue)}.p-queued{background:var(--slateS);color:var(--slate)}.p-blocked{background:var(--redS);color:var(--red)}.p-failed{background:var(--redS);color:var(--red)}
.p-met{background:var(--greenS);color:var(--green)}.p-planned{background:var(--slateS);color:var(--slate)}.p-rbi{background:var(--blueS);color:var(--blue)}.p-sebi{background:var(--brandSoft);color:var(--brandD)}
.tag{display:inline-block;padding:3px 9px;border-radius:7px;font-size:11px;font-weight:500;background:#F0F3F8;color:#5E6B7A}
.crit-txt{color:var(--red);font-weight:600}
.btn{background:var(--brand);color:#fff;border:none;border-radius:9px;padding:9px 14px;font-weight:600;font-size:12.5px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;box-shadow:0 1px 3px rgba(231,127,16,.28)}
.btn:hover{background:var(--brandD)}.btn svg{width:15px;height:15px;stroke:currentColor}
.btn.sec{background:#fff;color:var(--navy);border:1px solid var(--line);box-shadow:none;font-weight:500}.btn.sec:hover{background:#F6F8FB}
.btn.sm{padding:6px 10px;font-size:12px}.btn.gho{background:none;color:var(--slate);border:1px solid var(--line);box-shadow:none;padding:5px 10px;font-size:12px;font-weight:500}
.btn:disabled{opacity:.5;cursor:not-allowed}
.bar{height:8px;border-radius:5px;background:#EEF2F7;overflow:hidden}.bar>span{display:block;height:100%;border-radius:5px}
.seg{display:inline-flex;background:#EEF2F7;border-radius:10px;padding:3px}.seg .s{padding:6px 13px;border-radius:8px;font-size:12.5px;cursor:pointer;color:var(--muted);font-weight:500}.seg .s.on{background:#fff;color:var(--navy);box-shadow:var(--sh-sm);font-weight:600}
.empty{text-align:center;padding:38px 20px;color:var(--muted)}.empty svg{width:34px;height:34px;stroke:#C4CDD8;margin-bottom:10px}
.hint{font-size:12px;color:var(--muted);margin:12px 19px 16px;display:flex;gap:7px}.hint svg{width:15px;height:15px;stroke:var(--brand);flex:none;margin-top:1px}
.sw{width:10px;height:10px;border-radius:3px;display:inline-block}
.back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:12.5px;cursor:pointer;margin-bottom:14px;font-weight:500}.back:hover{color:var(--navy)}.back svg{width:15px;height:15px;stroke:currentColor}
.dhdr{display:flex;align-items:flex-start;gap:14px;margin-bottom:6px}.dhdr h2{margin:0;font-size:19px;color:var(--navy);font-weight:600}
.meta{display:flex;flex-wrap:wrap;gap:14px;font-size:12.5px;color:var(--muted);margin:4px 0 18px}.meta b{color:var(--ink);font-weight:600}
/* ---- Progress ---- */
.progwrap{background:linear-gradient(180deg,#fff,#fbfcfe);border:1px solid var(--line);border-radius:14px;padding:20px;box-shadow:var(--sh-sm)}
.progtop{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.progpct{font-size:30px;font-weight:600;color:var(--navy);letter-spacing:-1px}
.progbar{height:12px;border-radius:8px;background:#EDF1F6;overflow:hidden;flex:1}
.progbar>span{display:block;height:100%;border-radius:8px;background:linear-gradient(90deg,#F79A2B,#ffce8f);transition:width .6s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.progbar>span::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);animation:sheen 1.3s infinite}
@keyframes sheen{100%{transform:translateX(200%)}}
.progtimes{display:flex;gap:22px;font-size:12.5px;color:var(--muted);margin-bottom:16px}.progtimes b{color:var(--navy);font-weight:600}
.steps{display:flex;flex-direction:column;gap:0}
.step{display:flex;align-items:center;gap:13px;padding:11px 0;border-bottom:1px solid var(--line2)}.step:last-child{border-bottom:none}
.step .si{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;flex:none;border:2px solid var(--line)}
.step .si svg{width:14px;height:14px}
.step.done .si{background:var(--greenS);border-color:var(--green);color:var(--green)}
.step.running .si{background:var(--blueS);border-color:var(--blue);color:var(--blue)}
.step.skipped .si{background:var(--slateS);border-color:#d5dbe3;color:var(--slate)}
.step .sn{flex:1;font-size:13px;font-weight:500;color:var(--ink)}
.step.pending .sn{color:var(--muted)}
.step .sd{font-size:11.5px;color:var(--muted);font-family:Consolas,monospace}
.spin{width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;display:inline-block}@keyframes sp{to{transform:rotate(360deg)}}
.runbanner{display:flex;align-items:center;gap:12px;background:var(--blueS);border:1px solid #cfe0fb;border-radius:12px;padding:11px 15px;margin-bottom:16px;cursor:pointer}
.runbanner .rb{flex:1}.runbanner .rp{font-weight:600;color:var(--navy);font-size:13px}.runbanner .rbar{height:6px;border-radius:4px;background:#d5e3fb;overflow:hidden;margin-top:6px}.runbanner .rbar>span{display:block;height:100%;background:var(--blue);transition:width .6s}
.dot-run{width:8px;height:8px;border-radius:50%;background:var(--blue);display:inline-block;animation:pulse 1.2s infinite}@keyframes pulse{50%{opacity:.35}}
/* ---- Explainer ---- */
.doc{max-width:820px}.doc h2{color:var(--navy);font-size:18px;margin:22px 0 10px}.doc h3{color:var(--navy);font-size:14.5px;margin:20px 0 8px}
.doc p{margin:0 0 12px;color:var(--ink)}.doc ul{margin:0 0 14px;padding-left:20px}.doc li{margin:5px 0}
.doc .lead{font-size:15px;color:var(--muted)}
.flow{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0}
.flow .fs{flex:1;min-width:150px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:var(--sh-sm)}
.flow .fs .fn{width:26px;height:26px;border-radius:8px;background:var(--brandSoft);color:var(--brandD);display:grid;place-items:center;font-weight:600;font-size:12px;margin-bottom:8px}
.flow .fs .ft{font-weight:600;color:var(--navy);font-size:13px;margin-bottom:3px}.flow .fs .fd{font-size:12px;color:var(--muted)}
/* ---- Modal / toast ---- */
.scrim{position:fixed;inset:0;background:rgba(20,32,48,.4);opacity:0;pointer-events:none;transition:.2s;z-index:40}.scrim.show{opacity:1;pointer-events:auto}
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-46%);width:440px;max-width:94vw;background:#fff;border-radius:16px;box-shadow:var(--sh-lg);z-index:41;opacity:0;pointer-events:none;transition:.2s}.modal.show{opacity:1;pointer-events:auto;transform:translate(-50%,-50%)}
.modal .mh{padding:18px 22px;border-bottom:1px solid var(--line);font-size:16px;font-weight:600;color:var(--navy)}.modal .mb{padding:18px 22px}.modal .mf{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
.toast{position:fixed;right:24px;bottom:24px;background:var(--navy);color:#fff;padding:13px 18px;border-radius:11px;font-size:13px;font-weight:500;box-shadow:var(--sh-lg);opacity:0;transform:translateY(12px);transition:.25s;z-index:60;display:flex;gap:10px;align-items:center;max-width:420px}.toast.show{opacity:1;transform:translateY(0)}.toast svg{width:18px;height:18px;stroke:var(--brand);flex:none}
.fscrim{position:fixed;inset:0;background:rgba(20,32,48,.34);opacity:0;pointer-events:none;transition:.2s;z-index:44}.fscrim.show{opacity:1;pointer-events:auto}
.fdrawer{position:fixed;top:0;right:0;height:100vh;width:485px;max-width:96vw;background:#fff;box-shadow:-14px 0 44px rgba(16,24,40,.18);transform:translateX(102%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:45;display:flex;flex-direction:column;overflow:hidden}.fdrawer.show{transform:translateX(0)}
.fdh{padding:18px 22px;border-bottom:1px solid var(--line)}
.fdh .fx{float:right;width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:#fff;display:grid;place-items:center;cursor:pointer}.fdh .fx svg{width:15px;height:15px;stroke:var(--slate)}
.fdb{padding:16px 22px 44px;overflow:auto}
.drow{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--line2);font-size:12.8px}.drow .k{color:var(--muted)}.drow .v{font-weight:600;color:var(--navy);text-align:right}
.dsec{margin-top:18px}.dsec h4{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:0 0 9px;font-weight:600}
.dcard{background:#F7F9FC;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:12.6px;line-height:1.5;color:var(--ink)}
.tl .ti{position:relative;padding-left:18px;padding-bottom:13px}.tl .ti::before{content:"";position:absolute;left:0;top:4px;width:8px;height:8px;border-radius:50%;background:var(--brand)}.tl .ti::after{content:"";position:absolute;left:3px;top:12px;bottom:-2px;width:2px;background:var(--line)}.tl .ti:last-child::after{display:none}
.tl .tt2{font-size:12.5px;color:var(--ink)}.tl .tm{font-size:11px;color:var(--muted);margin-top:1px}
.mini{padding:7px 9px;border:1px solid var(--line);border-radius:8px;font-size:12.5px;font-family:inherit;color:var(--ink);outline:none}.mini:focus{border-color:var(--brand)}
.klink{cursor:pointer;transition:box-shadow .15s,transform .15s}.klink:hover{box-shadow:var(--sh);transform:translateY(-1px)}
.karr{color:var(--muted);font-size:15px;align-self:flex-start}
.sevbar{cursor:pointer;padding:5px 6px;border-radius:8px;margin:3px -6px}.sevbar:hover{background:#F7F9FC}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
input.mini{background:#fff}
.expand>td{padding:0!important}

.hamb{display:grid;place-items:center;width:36px;height:36px;border-radius:9px;border:1px solid var(--line);background:#fff;cursor:pointer;flex:none}
.hamb svg{width:19px;height:19px;stroke:var(--slate)}
.app.navclosed{grid-template-columns:0 1fr}
.side{overflow-x:hidden}
.navscrim{display:none}
@media(max-width:860px){
 .app{grid-template-columns:1fr!important}
 .side{position:fixed;top:0;left:0;bottom:0;width:250px;z-index:60;transform:translateX(-100%);transition:transform .25s;box-shadow:2px 0 18px rgba(16,24,40,.18)}
 .app.navopen .side{transform:translateX(0)}
 .navscrim{position:fixed;inset:0;background:rgba(16,24,40,.42);z-index:55;opacity:0;pointer-events:none;transition:.2s;display:block}
 .app.navopen .navscrim{opacity:1;pointer-events:auto}
 .top{padding:11px 14px;gap:10px}
 .top h1{font-size:16px}
 .search,.tenant{display:none!important}
 .umenu .nm,.umenu .rl{display:none}
 .wrap{padding:16px 13px}
 .row2,.row2b,.row3{grid-template-columns:1fr!important}
 .tablecard{overflow-x:auto}
 table{min-width:620px}
 .fdrawer{width:100vw;max-width:100vw}
 .modal{width:94vw}
 .toolbar{gap:8px}
}
</style>

let TOKEN='';

async function loginReq(email,password){const r=await fetch(API+'/auth/login',{method:'POST',credentials:'include',headers:{'content-type':'application/json'},body:JSON.stringify({email,password})});if(!r.ok)throw new Error('bad');return r.json();}
async function api(p,opt={}){
 const r=await fetch(API+p,{method:opt.method||'GET',credentials:'include',headers:{'content-type':'application/json',...(TOKEN?{authorization:'Bearer '+TOKEN}:{})},body:opt.body?JSON.stringify(opt.body):undefined});
 if(r.status===401){logout();throw new Error('unauthorized');}
 const t=await r.text();if(!r.ok)throw new Error(t||r.statusText);return t?JSON.parse(t):{};
}
const can=p=>ME&&ME.perms&&ME.perms.includes(p);
async function doLogin(){const b=$('l_btn');b.disabled=true;$('l_err').textContent='';
 try{const res=await loginReq($('l_email').value.trim(),$('l_password').value);TOKEN=res.token;ME=res.user;enterApp();}
 catch(e){$('l_err').textContent='Invalid email or password';}finally{b.disabled=false;}}
function logout(){TOKEN='';ME=null;try{fetch(API+'/auth/logout',{method:'POST',credentials:'include'}).catch(()=>{});}catch{}$('app').classList.add('hidden');$('login').classList.remove('hidden');}
function enterApp(){$('login').classList.add('hidden');$('app').classList.remove('hidden');
 $('u_nm').textContent=ME.name||ME.email;$('u_rl').textContent=ME.role;$('u_av').textContent=(ME.name||ME.email||'A').slice(0,1).toUpperCase();

function compDonut(){const src=(S.compliance&&S.compliance.length)?S.compliance:OBLIGATIONS;const met=src.filter(o=>o.status==='Met').length,prog=src.filter(o=>o.status==='In Progress'||o.status==='In progress').length,plan=src.length-met-prog,tot=src.length||1;
 const seg=[['Met',met,'#1E9E73'],['In progress',prog,'#F79A2B'],['Planned',plan,'#9AA7B5']];let off=0,r=52,circ=2*Math.PI*r,arcs='';

// ---- Scan detail: progress + steps + findings + PDF ----
function stepIcon(st){if(st==='done')return `<span class="si"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">${IC.checkline}</svg></span>`;
 if(st==='running')return '<span class="si"><span class="spin"></span></span>';
 if(st==='skipped')return `<span class="si"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">${IC.x}</svg></span>`;
 return '<span class="si"></span>';}
function vScanDetail(){const j=byId(S.jobs,S.curJob);if(!j)return emptyState('scan','Scan not found.');
 const steps=j.steps||[];const running=j.status==='running'||j.status==='queued';const done=j.status==='completed';
 const prog=done?100:(j.status==='blocked'||j.status==='failed'?(j.progress||0):(j.progress||0));
 const elapsed=j.started_at?((j.finished_at?new Date(j.finished_at):new Date())-new Date(j.started_at))/1000:0;
 const fnds=S.findings.filter(f=>f.scan_job_id===j.id);
 let stepsHtml;
 if(steps.length)stepsHtml=steps.map(s=>`<div class="step ${s.status}">${stepIcon(s.status)}<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;color:${s.status==='pending'?'var(--muted)':'var(--ink)'}">${s.name}</div>${(s.status==='skipped'&&s.reason)?`<div style="font-size:11px;color:var(--amber);margin-top:2px">${s.reason}</div>`:''}</div><span class="sd">${s.status==='done'&&s.startedAt&&s.finishedAt?dur((new Date(s.finishedAt)-new Date(s.startedAt))/1000)+(s.findings?` · ${s.findings} found`:''):s.status==='running'?'running…':s.status==='skipped'?'skipped':'queued'}</span></div>`).join('');
 else if(done)stepsHtml=`<div class="step done">${stepIcon('done')}<span class="sn">Scan completed — ${fnds.length} finding(s) recorded</span><span class="sd">step timeline not captured</span></div>`;
 else if(j.status==='blocked'||j.status==='failed')stepsHtml=`<div class="step skipped">${stepIcon('skipped')}<span class="sn">${cap(j.status)}</span><span class="sd">${j.status_reason||''}</span></div>`;
 else stepsHtml=`<div class="step running">${stepIcon('running')}<span class="sn">Preparing…</span><span class="sd">queued</span></div>`;
 return `<div class="back" onclick="openAsset('${j.asset_id}')">${ic('back')}Back to ${assetName(j.asset_id)}</div>
 <div class="dhdr"><h2>${assetName(j.asset_id)} — scan v${j.version}</h2></div>
 <div class="meta"><span>Target <b>${j.target_url}</b></span><span>Profile <b>${j.profile}</b></span><span>Status ${running?`<b>${cap(j.status)}</b>`:stP(j.status)}</span><span>Requested by <b>${j.requested_by||'—'}</b></span></div>
 <div class="progwrap">
   <div class="progtop"><div class="progpct">${prog}%</div><div class="progbar"><span style="width:${Math.max(prog,2)}%"></span></div></div>

   <div class="steps">${stepsHtml}</div>
   ${j.status==='blocked'?`<div class="hint" style="margin:14px 0 0">${ic('info')}<span style="color:var(--red)">Blocked: ${j.status_reason||'authorization required'}</span></div>`:''}
 </div>
 <div id="shotbox" style="margin:16px 0"></div>
 <div style="display:flex;align-items:center;gap:10px;margin:18px 0 14px"><h2 style="font-size:15px;color:var(--navy);margin:0">Findings (${fnds.length})</h2><div style="flex:1"></div>${can('report:read')&&done?`<button class="btn sm" onclick="downloadReport('${j.id}')">${ic('download')}Download PDF report</button>`:''}</div>

 ${fnds.map(f=>`<tr class="clickrow" onclick="openFinding('${f.id}')"><td>${riskPill(f.risk_score)}</td><td class="tt">${f.category==='secrets'?'<span class="pill p-critical" style="padding:1px 7px;margin-right:6px" title="Secret exposed in client-side code — visible via View Source / DevTools">SECRET</span>':''}${f.title}</td><td>${sevP(f.severity)}</td><td><span class="tag">${f.category||'-'}</span></td><td class="mono">${f.scanner||'-'}</td><td class="mono">${f.cve||'—'}</td><td>${stP(f.status)}</td></tr>`).join('')}

// ---- How it works (explainer) ----
function vHow(){return `<div class="doc">
 <p class="lead">The AntShield VAPT module runs vulnerability assessment and penetration testing against your registered assets, normalises the results into severity-scored findings, maps each one to the exact RBI and SEBI clause it affects, and tracks remediation against the regulatory SLA — with signed, versioned evidence and PDF reports.</p>
 <div class="flow">
  <div class="fs"><div class="fn">1</div><div class="ft">Register asset</div><div class="fd">Add a system with its URL & criticality. Criticality and DMZ status auto-derive the test cadence (RBI: VA 6-monthly, PT 12-monthly).</div></div>
  <div class="fs"><div class="fn">2</div><div class="ft">Authorise & scan</div><div class="fd">Pick a profile. The engine plans steps, estimates time, and runs each scanner, updating live progress.</div></div>
  <div class="fs"><div class="fn">3</div><div class="ft">Normalise & score</div><div class="fd">Results are de-duplicated, CVSS-scored, and each finding is linked to its RBI/SEBI clause and remediation SLA.</div></div>
  <div class="fs"><div class="fn">4</div><div class="ft">Remediate & report</div><div class="fd">Track fixes against the SLA clock, close findings into the audit trail, and export a PDF report with recommendations.</div></div>
 </div>
 <h2>Scan profiles</h2>
 <p>Each profile selects a different set of scanners. Every scan is stored as a new <b>version</b> against the asset, so you keep a full history and can compare posture over time.</p>
 <ul>
  <li><b>Passive</b> — safe, non-intrusive checks that behave like a normal browser request: HTTPS/TLS enforcement, security headers (HSTS, CSP, X-Frame-Options…), cookie flags (Secure/HttpOnly/SameSite), certificate protocol & expiry, server-banner disclosure and a <span class="mono">security.txt</span> check. Runs against any asset you own — no authorisation gate.</li>
  <li><b>Baseline</b> — passive plus an OWASP ZAP baseline spider and a deep TLS audit (testssl.sh). Non-destructive, but it sends real traffic, so it requires a stored authorisation for the host.</li>
  <li><b>Active</b> — the full suite: Nuclei templates, Nmap service discovery, ZAP active scan and TLS audit. Intrusive, so it is disabled unless the server has <span class="mono">ACTIVE_SCANS_ENABLED=true</span> <i>and</i> a valid, in-scope authorisation record exists for the target host.</li>
 </ul>
 <h2>The scanning engine</h2>
 <p>The module orchestrates established, industry-standard tools rather than shipping any exploit code of its own. Adapters invoke each tool, capture its output, and translate it into a common finding schema. Missing tools are skipped gracefully, so a passive scan always works even before ZAP/Nuclei are installed.</p>
 <h3>Safety & authorisation</h3>
 <p>Active testing sends attack-style traffic and is only ever permitted against systems you are authorised to test. The engine enforces this with a two-part gate — a server-level kill-switch and a per-host authorisation record with an expiry — and every scan, block and finding is written to an immutable audit log.</p>
 <h2>Scoring, mapping & SLAs</h2>
 <p>Findings carry a severity and (where available) a CVSS score and CWE. Each is tagged with the regulatory clauses it relates to — for example a weak-TLS finding maps to RBI Sec 16 (Cryptographic controls) and SEBI PR.DS. Remediation due-dates follow SEBI CSCRF: <b>one week</b> for high-severity items, <b>three months</b> for the rest.</p>
 <h2>Evidence & reporting</h2>
 <p>Every scan produces a versioned record with per-step timing. Completed scans can be exported as a professional <b>PDF report</b> containing an executive summary, the full findings list with recommended remediation, and the regulatory mapping — suitable for auditors and board packs.</p>
 <h2>Roles & access (RBAC)</h2>
 <p>Access is controlled by role: <b>Admin</b> (full control incl. user management), <b>Analyst</b> (register assets, run scans, remediate), <b>Auditor</b> (read + reports), and <b>Viewer</b> (read-only). Actions you lack permission for are hidden.</p>
</div>`;}

 b+=dl('Asset',assetName(f.asset_id))+(f.evidence&&f.evidence.url?dl('URL','<a href="'+f.evidence.url+'" target="_blank" style="word-break:break-all">'+esc(f.evidence.url)+'</a>'):'')+dl('Category',f.category||'—')+dl('Scanner / source',f.scanner||f.source||'—')+dl('CVSS',f.cvss||'—')+(f.cve?dl('CVE',`<a href="https://nvd.nist.gov/vuln/detail/${f.cve}" target="_blank">${f.cve}</a>`):'')+(f.epss!=null?dl('EPSS','<span title="Exploit Prediction Scoring System (FIRST.org): probability this CVE is exploited within 30 days">~'+(Math.round(f.epss*1000)/10)+'% exploit prob.</span>'):'')+dl('CWE',f.cwe||'—')+dl('Owner',f.owner||'unassigned')+dl('SLA due',fmt(f.due_at));

 <div class="dcard" style="max-height:190px;overflow:auto;font-size:12px;line-height:1.55;margin-bottom:12px"><b>Authorization &amp; legal terms</b><br>Active scanning sends intrusive, attack-style traffic to <b>${host}</b> (injection, fuzzing, redirect and port probes). By enabling it you confirm that:<br>• your organisation owns, or is contractually authorised to test, this system;<br>• you have obtained any approvals required by law and by the system's operator / hosting provider;<br>• testing may cause load, alerts or unintended effects, and Treeants Technologies accepts no liability for resulting impact;<br>• this authorization is time-bound and may be revoked at any time.</div>
 <div class="fld"><label>Your name &amp; role (authoriser)</label><input id="ac_name" placeholder="e.g. R. Sharma, CISO"/></div>
 <div class="fld"><label>Authorization valid for (days)</label><input id="ac_days" type="number" value="30" min="1" max="365"/></div>
 <label style="display:flex;gap:9px;align-items:flex-start;font-size:12.5px;color:var(--ink);cursor:pointer"><input type="checkbox" id="ac_accept" style="margin-top:2px"/> I confirm I am authorised to run active security testing against ${host} and accept the terms above.</label>
 </div><div class="mf"><button class="btn sec" onclick="closeModal()">Cancel</button><button class="btn" onclick="doEnableActive('${assetId}','${host}')">Enable active scanning</button></div>`);}
async function doEnableActive(assetId,host){const name=$('ac_name').value.trim(),accepted=$('ac_accept').checked,days=parseInt($('ac_days').value)||30;
 if(!name){toast('Enter your name & role');return;}if(!accepted){toast('You must accept the terms');return;}
 try{await api('/assets/'+assetId+'/authorizations',{method:'POST',body:{scopeHosts:[host],authorizedBy:name,method:'active',accepted:true,expiresInDays:days}});closeModal();toast('Active scanning enabled for '+host);await loadAll();}catch(e){toast('Failed: '+shortErr(e));}}
async function loadActiveStatus(assetId){const el=$('activebox');if(!el)return;try{const s=await api('/assets/'+assetId+'/active-status');
 if(s.enabled)el.innerHTML=`<div class="dcard" style="display:flex;align-items:center;gap:10px;background:var(--greenS);border-color:#bfe6d5"><span class="pill p-closed"><span class="pd"></span>Active scanning enabled</span><span style="font-size:12.5px;color:#177a58;flex:1">${s.host} · authorised by ${s.authorizedBy||'—'} · until ${fmt(s.expiresAt)}</span>${can('scan:run')?`<button class="btn sm sec" onclick="openActiveConsent('${assetId}','${s.host}')">Renew</button>`:''}</div>`;
 else el.innerHTML=`<div class="dcard" style="display:flex;align-items:center;gap:12px"><span class="pill p-info">Active scanning disabled</span><span style="font-size:12.5px;color:var(--muted);flex:1">Intrusive testing is off for this asset.${s.orgLocked?' Locked org-wide by an administrator.':''}</span>${can('scan:run')&&!s.orgLocked?`<button class="btn sm" onclick="openActiveConsent('${assetId}','${s.host}')">${ic('lock')}Enable active scanning</button>`:''}</div>`;
 }catch{el.innerHTML='';}}

function vSettings(){if(!can('user:manage'))return emptyState('users','No access to settings.');if(!SLA)return emptyState('clock','Loading settings…');
 const crit=['Critical','High','Medium','Low'];const sev=['Critical','High','Medium','Low','Info'];
 return `<div class="card tablecard"><div class="chd"><h2>Remediation SLA policy</h2><span class="leg">days to remediate · asset criticality × finding severity</span></div>
 <table><thead><tr><th>Criticality \\ Severity</th>${sev.map(s=>`<th>${s}</th>`).join('')}</tr></thead><tbody>
 ${crit.map(c=>`<tr><td class="tt">${c}</td>${sev.map(s=>`<td><input class="mini" style="width:62px" type="number" min="0" value="${(SLA[c]&&SLA[c][s])!=null?SLA[c][s]:''}" data-c="${c}" data-s="${s}"/></td>`).join('')}</tr>`).join('')}
 </tbody></table><div style="padding:14px 16px"><button class="btn" onclick="saveSla()">Save SLA policy</button></div>

 <label style="display:flex;align-items:center;gap:10px;font-weight:500;cursor:pointer;padding:4px 2px"><input type="checkbox" id="lockchk" ${LOCK?'checked':''} onchange="saveLock(this.checked)"/> Lock all active scanning organisation-wide</label>
 <div class="hint" style="margin:8px 0 0">${ic('info')}<span>${LOCK?'Active scanning is currently blocked for every asset, overriding per-asset authorizations.':'Active scanning is governed per-asset via the authorization consent flow.'}</span></div></div>`;}
async function saveSla(){const m={};document.querySelectorAll('input[data-c]').forEach(i=>{m[i.dataset.c]=m[i.dataset.c]||{};m[i.dataset.c][i.dataset.s]=parseInt(i.value)||0;});try{await api('/settings/sla',{method:'PUT',body:m});SLA=m;toast('SLA policy saved');}catch(e){toast('Save failed: '+shortErr(e));}}
async function saveLock(v){try{await api('/settings/active-lock',{method:'PUT',body:{locked:v}});LOCK=v;toast('Updated');render();}catch(e){toast(shortErr(e));}}
// ---- overrides: vAssetDetail (rich) + vScanDetail (actions) ----
function vAssetDetail(){const a=byId(S.assets,S.curAsset);if(!a)return emptyState('assets','Asset not found.');
 const jobs=S.jobs.filter(j=>j.asset_id===a.id);const af=S.findings.filter(f=>f.asset_id===a.id&&f.status!=='Closed');
 const meta2=[['Type',a.type],['Criticality',a.criticality],['Environment',a.environment],['Owner',a.owner],['Business unit',a.business_unit],['Region',a.region],['Data class',a.data_classification]].filter(x=>x[1]);
 return `<div class="back" onclick="go('assets')">${ic('back')}Back to assets</div>
 <div class="dhdr"><h2>${a.name}</h2></div>
 <div class="meta">${meta2.map(m=>`<span>${m[0]} <b>${m[1]}</b></span>`).join('')}<span>URL <b>${a.base_url||'—'}</b></span><span>Open findings <b>${af.length}</b></span></div>
 ${a.description?`<div class="dcard" style="margin-bottom:12px">${a.description}</div>`:''}
 ${(a.tags&&a.tags.length)?`<div style="margin-bottom:12px">${a.tags.map(t=>`<span class="tag" style="margin:2px">${t}</span>`).join('')}</div>`:''}
 <div id="activebox" style="margin:0 0 14px"></div>
 <div style="margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap">${can('scan:run')?`<button class="btn sm" onclick="runScan('${a.id}','passive')">${ic('scan')}Run passive scan</button><button class="btn sm sec" onclick="openScanModal('${a.id}')">${ic('plus')}New scan (profile)</button>`:''}${can('finding:write')?`<button class="btn sm sec" onclick="openImportModal('${a.id}')">${ic('download')}Import results</button>`:''}${can('scan:run')?`<button class="btn sm sec" onclick="openAuthModal('${a.id}')">${ic('lock')}Auth</button>`:''}${can('asset:write')?`<button class="btn sm sec" onclick="openOpenApiModal('${a.id}')">${ic('doc')}Import OpenAPI</button>`:''}</div>
 <div class="card tablecard"><div class="chd"><h2>Scan history</h2><span class="leg">${jobs.length} scans · newest first</span></div>
 ${jobs.length?`<table><thead><tr><th>Version</th><th>Profile</th><th>Findings</th><th>Status</th><th>Started</th><th>Duration</th></tr></thead><tbody>
 ${jobs.map(j=>{const d=(j.started_at&&j.finished_at)?dur((new Date(j.finished_at)-new Date(j.started_at))/1000):(j.status==='running'?'running…':'—');return `<tr class="clickrow" onclick="openJob('${j.id}')"><td class="tt">v${j.version}</td><td><span class="tag">${j.profile}</span></td><td class="tt">${(j.summary&&j.summary.total)??'—'}</td><td>${j.status==='running'||j.status==='queued'?`<span class="dot-run"></span> ${cap(j.status)} ${j.progress||0}%`:stP(j.status)}</td><td class="mono">${fmtT(j.started_at||j.queued_at)}</td><td class="mono">${d}</td></tr>`;}).join('')}
 </tbody></table>`:emptyState('scan','No scans for this asset yet.',can('scan:run')?`<button class="btn sm" onclick="runScan('${a.id}','passive')">${ic('scan')}Run first scan</button>`:'')}</div>`;}
function vScanDetail(){const j=byId(S.jobs,S.curJob);if(!j)return emptyState('scan','Scan not found.');
 const steps=j.steps||[];const running=j.status==='running'||j.status==='queued';const done=j.status==='completed';
 const prog=done?100:(j.progress||0);const elapsed=j.started_at?((j.finished_at?new Date(j.finished_at):new Date())-new Date(j.started_at))/1000:0;
 const fnds=S.findings.filter(f=>f.scan_job_id===j.id);
 let stepsHtml;
 if(steps.length)stepsHtml=steps.map(s=>`<div class="step ${s.status}">${stepIcon(s.status)}<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;color:${s.status==='pending'?'var(--muted)':'var(--ink)'}">${s.name}</div>${(s.status==='skipped'&&s.reason)?`<div style="font-size:11px;color:var(--amber);margin-top:2px">${s.reason}</div>`:''}</div><span class="sd">${s.status==='done'&&s.startedAt&&s.finishedAt?dur((new Date(s.finishedAt)-new Date(s.startedAt))/1000)+(s.findings?` · ${s.findings} found`:''):s.status==='running'?'running…':s.status==='skipped'?'skipped':'queued'}</span></div>`).join('');
 else if(done)stepsHtml=`<div class="step done">${stepIcon('done')}<span class="sn">Scan completed — ${fnds.length} finding(s) recorded</span><span class="sd">step timeline not captured</span></div>`;
 else if(j.status==='blocked'||j.status==='failed'||j.status==='cancelled')stepsHtml=`<div class="step skipped">${stepIcon('skipped')}<span class="sn">${cap(j.status)}</span><span class="sd">${j.status_reason||''}</span></div>`;
 else stepsHtml=`<div class="step running">${stepIcon('running')}<span class="sn">Preparing…</span><span class="sd">queued</span></div>`;
 return `<div class="back" onclick="openAsset('${j.asset_id}')">${ic('back')}Back to ${assetName(j.asset_id)}</div>
 <div class="dhdr"><h2>${assetName(j.asset_id)} — scan v${j.version}</h2></div>
 <div class="meta"><span>Target <b>${j.target_url}</b></span><span>Profile <b>${j.profile}</b></span><span>Status ${running?`<b>${cap(j.status)}</b>`:stP(j.status)}</span><span>Requested by <b>${j.requested_by||'—'}</b></span></div>
 <div style="display:flex;gap:9px;flex-wrap:wrap;margin-bottom:14px">
  ${(running&&can('scan:run'))?`<button class="btn sm sec" onclick="cancelScan('${j.id}')">Cancel scan</button>`:''}
  ${(j.status==='blocked'&&j.profile!=='passive'&&can('scan:run'))?`<button class="btn sm" onclick="openActiveConsent('${j.asset_id}','${hostOf(j.target_url)}')">${ic('lock')}Enable active scanning</button>`:''}
  ${(['blocked','failed','completed','cancelled'].includes(j.status)&&can('scan:run'))?`<button class="btn sm sec" onclick="runScan('${j.asset_id}','${j.profile}')">${ic('refresh')}Retry (new version)</button>`:''}
 </div>
 <div class="progwrap"><div class="progtop"><div class="progpct">${prog}%</div><div class="progbar"><span style="width:${Math.max(prog,2)}%"></span></div></div>
   <div class="progtimes"><span>Started <b>${fmtT(j.started_at)}</b></span><span>${j.finished_at?'Finished':'Elapsed'} <b>${j.finished_at?fmtT(j.finished_at):dur(elapsed)}</b></span>${j.estimated_seconds?`<span>Est. total <b>~${dur(j.estimated_seconds)}</b></span>`:''}${j.finished_at&&j.started_at?`<span>Duration <b>${dur((new Date(j.finished_at)-new Date(j.started_at))/1000)}</b></span>`:''}</div>
   <div class="steps">${stepsHtml}</div>
   ${j.status==='blocked'?`<div class="hint" style="margin:14px 0 0">${ic('info')}<span style="color:var(--red)">${j.status_reason||'Blocked'}</span></div>`:''}</div>
 <div id="shotbox" style="margin:16px 0"></div>
 <div style="display:flex;align-items:center;gap:10px;margin:18px 0 14px"><h2 style="font-size:15px;color:var(--navy);margin:0">Findings (${fnds.length})</h2><div style="flex:1"></div>${can('report:read')&&done?`<button class="btn sm" onclick="downloadReport('${j.id}')">${ic('download')}Download PDF report</button>`:''}</div>
 <div class="card tablecard">${fnds.length?`<table><thead><tr><th>Risk</th><th>Finding</th><th>Severity</th><th>Category</th><th>Scanner</th><th>CVE</th><th>Status</th></tr></thead><tbody>
 ${fnds.map(f=>`<tr class="clickrow" onclick="openFinding('${f.id}')"><td>${riskPill(f.risk_score)}</td><td class="tt">${f.title}</td><td>${sevP(f.severity)}</td><td><span class="tag">${f.category||'-'}</span></td><td class="mono">${f.scanner||'-'}</td><td class="mono">${f.cve||'—'}</td><td>${stP(f.status)}</td></tr>`).join('')}
 </tbody></table>`:running?emptyState('scan','Scanning… findings will appear as steps complete.'):emptyState('check','No findings recorded for this scan.')}</div>`;}


function openObligation(id){const o=(S.compliance||[]).find(x=>x.id===id);if(!o)return;const w=can('finding:write');
 let b=`<div class="fdh"><div class="fx" onclick="closeFdrawer()">${ic('x')}</div><div class="mono">${o.id} · ${o.framework}</div><div style="font-size:16px;font-weight:600;color:var(--navy);margin-top:4px;padding-right:36px">${o.clause}</div><div style="margin-top:9px;display:flex;gap:7px;flex-wrap:wrap">${compStatusPill(o.status)}${o.source==='auto'?'<span class="tag" title="Auto-derived from live data">auto</span>':o.source==='manual'?'<span class="tag">attested</span>':''}</div></div><div class="fdb">`;
 b+=dl('Applicability',o.applicability||'—')+dl('Cadence',o.cadence||'—')+dl('Module',o.module)+(o.updatedBy?dl('Last attested by',esc(o.updatedBy)):'');
 b+='<div class="dsec"><h4>Requirement</h4><div class="dcard">'+esc(o.requirement)+'</div></div>';
 b+='<div class="dsec"><h4>AntShield control</h4><div class="dcard">'+esc(o.control||'—')+'</div></div>';
 b+='<div class="dsec"><h4>Expected evidence</h4><div class="dcard">'+esc(o.evidence_expected||'—')+'</div></div>';
 if(o.auto){b+='<div class="dsec"><div class="dcard" style="color:var(--muted)">Auto-evaluated from your live data (assets, scans, remediation SLAs) — not manually editable.</div></div>';}
 else if(w){b+=`<div class="dsec"><h4>Attest status</h4><div style="display:flex;gap:8px;flex-wrap:wrap"><select class="mini" id="ob_status">${['Met','In Progress','Not Met','Not Applicable','Not Assessed'].map(s=>`<option ${s===o.status?'selected':''}>${s}</option>`).join('')}</select><input class="mini" id="ob_owner" placeholder="owner" value="${o.owner||''}" style="flex:1"/></div><textarea id="ob_notes" style="width:100%;margin-top:8px;min-height:54px;border:1px solid var(--line);border-radius:8px;padding:8px;font-family:inherit;font-size:12.5px" placeholder="notes / evidence reference">${o.notes||''}</textarea><button class="btn sm" style="margin-top:8px" onclick="saveObligation('${o.id}')">Save attestation</button></div>`;}
 if(o.notes&&(o.auto||!w))b+='<div class="dsec"><h4>Notes</h4><div class="dcard">'+esc(o.notes)+'</div></div>';
 b+='</div>';$('fdrawer').innerHTML=b;$('fscrim').classList.add('show');$('fdrawer').classList.add('show');}
async function saveObligation(id){const b={status:$('ob_status').value,owner:$('ob_owner').value.trim()||undefined,notes:$('ob_notes').value.trim()||undefined};try{await api('/compliance/'+id,{method:'PATCH',body:b});closeFdrawer();toast('Compliance attestation saved');await loadAll();}catch(e){toast('Save failed: '+shortErr(e));}}


function toggleNav(){const a=$('app');if(!a)return;if(window.innerWidth<=860)a.classList.toggle('navopen');else a.classList.toggle('navclosed');}
function navClose(){const a=$('app');if(a&&window.innerWidth<=860)a.classList.remove('navopen');}
</script>
</body>
